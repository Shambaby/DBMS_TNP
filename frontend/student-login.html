<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TNP Portal — Student Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #2d1b69 0%, #1e1050 60%, #0f0730 100%);
      display: flex; align-items: center; justify-content: center;
    }
    body::before {
      content: ''; position: fixed;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.25), transparent);
      top: -150px; right: -100px; pointer-events: none;
    }
    .card {
      background: rgba(255,255,255,0.97);
      border-radius: 24px; padding: 2.5rem 2rem;
      width: 100%; max-width: 420px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      animation: fadeUp 0.5s ease;
      position: relative; z-index: 1;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .back-link { color: #64748b; font-size: 0.82rem; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 1.5rem; }
    .back-link:hover { color: #7c3aed; }
    .brand-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 16px; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem; font-size: 30px; color: #fff;
      box-shadow: 0 6px 20px rgba(124,58,237,0.4);
    }
    h4 { font-weight: 700; color: #1e293b; text-align: center; font-size: 1.35rem; }
    .subtitle { text-align: center; color: #64748b; font-size: 0.875rem; margin: 0.25rem 0 1.75rem; }
    .hint-box {
      background: #f5f3ff; border: 1px solid #ddd6fe;
      border-radius: 10px; padding: 0.75rem 1rem; margin-bottom: 1.5rem;
      font-size: 0.8rem; color: #5b21b6; display: flex; align-items: flex-start; gap: 8px;
    }
    .hint-box i { margin-top: 2px; flex-shrink: 0; }
    label { font-size: 0.875rem; font-weight: 500; color: #374151; display: block; margin-bottom: 0.4rem; }
    input[type=email], input[type=password] {
      width: 100%; padding: 0.65rem 0.9rem; border-radius: 10px;
      border: 1.5px solid #e2e8f0; font-size: 0.9rem; font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.12); }
    .form-group { margin-bottom: 1.1rem; }
    .btn-login {
      width: 100%; padding: 0.75rem; border: none; border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff; font-size: 0.95rem; font-weight: 600; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 0.5rem;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover:not(:disabled) { opacity: 0.92; transform: translateY(-1px); }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }
    .alert {
      background: #fef2f2; border: 1px solid #fecaca; color: #991b1b;
      border-radius: 10px; padding: 0.65rem 0.9rem; font-size: 0.85rem;
      margin-bottom: 1rem; display: none;
    }
    .spin { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <a href="index.html" class="back-link"><i class="bi bi-arrow-left"></i> Back</a>
    <div class="brand-icon"><i class="bi bi-person-badge-fill"></i></div>
    <h4>Student Login</h4>
    <p class="subtitle">Access your placement dashboard</p>

    <div class="hint-box">
      <i class="bi bi-info-circle-fill"></i>
      <span>Your default password is your <strong>email username</strong> (e.g. if your email is <em>john@college.edu</em>, password is <em>john</em>). Change it after login.</span>
    </div>

    <div id="alert-box" class="alert"></div>

    <div class="form-group">
      <label for="email">College Email</label>
      <input type="email" id="email" placeholder="you@college.edu" />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>

    <button class="btn-login" id="login-btn" onclick="doLogin()">
      <i class="bi bi-box-arrow-in-right"></i>
      <span id="btn-text">Sign In</span>
    </button>
  </div>

  <script src="js/api.js"></script>
  <script>
    if (localStorage.getItem("tnp_student")) window.location.href = "student-dashboard.html";

    async function doLogin() {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const alertEl  = document.getElementById("alert-box");
      const btn      = document.getElementById("login-btn");
      alertEl.style.display = "none";

      if (!email || !password) { alertEl.textContent = "Please enter your email and password."; alertEl.style.display = "block"; return; }

      btn.disabled = true;
      document.getElementById("btn-text").textContent = "Signing in...";
      btn.querySelector("i").className = "bi bi-arrow-clockwise spin";

      try {
        const data = await api.post("/students/login", { email, password });
        localStorage.setItem("tnp_student", JSON.stringify(data.student));
        window.location.href = "student-dashboard.html";
      } catch (err) {
        alertEl.textContent = err.error || "Login failed. Check your credentials.";
        alertEl.style.display = "block";
        btn.disabled = false;
        document.getElementById("btn-text").textContent = "Sign In";
        btn.querySelector("i").className = "bi bi-box-arrow-in-right";
      }
    }
    document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  </script>
</body>
</html>
