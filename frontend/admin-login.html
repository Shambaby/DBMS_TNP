<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TNP Portal — Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #1a56db 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #fff; border-radius: 20px; padding: 2.5rem 2rem;
      width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .brand-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #1a56db, #3b82f6);
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem; font-size: 28px; color: #fff;
      box-shadow: 0 4px 16px rgba(26,86,219,0.35);
    }
    h4 { font-weight: 700; color: #1e293b; }
    .back-link { color: #64748b; font-size: 0.82rem; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 1.5rem; }
    .back-link:hover { color: #1a56db; }
    label { font-size: 0.875rem; font-weight: 500; color: #374151; }
    .form-control { border-radius: 10px; border: 1.5px solid #e2e8f0; font-size: 0.9rem; }
    .form-control:focus { border-color: #1a56db; box-shadow: 0 0 0 3px rgba(26,86,219,0.12); }
    .btn-primary { background: linear-gradient(135deg, #1a56db, #3b82f6); border: none; border-radius: 10px; font-weight: 600; padding: 0.65rem; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.9; }
    .badge-admin { display: inline-flex; align-items: center; gap: 6px; background: #eff6ff; color: #1e40af; font-size: 0.75rem; font-weight: 600; padding: 4px 12px; border-radius: 20px; border: 1px solid #bfdbfe; }
  </style>
</head>
<body>
  <div class="login-card">
    <a href="index.html" class="back-link"><i class="bi bi-arrow-left"></i> Back to role selector</a>
    <div class="brand-icon"><i class="bi bi-shield-lock-fill"></i></div>
    <h4 class="text-center mb-1">Admin Login</h4>
    <p class="text-center text-muted small mb-3">TNP Administration Panel</p>
    <div class="text-center mb-4"><span class="badge-admin"><i class="bi bi-lock-fill"></i> Admin Access Only</span></div>

    <div id="alert-box" class="alert alert-danger d-none small py-2 rounded-3"></div>

    <div class="mb-3">
      <label class="form-label">Email address</label>
      <input type="email" id="email" class="form-control" placeholder="admin@tnp.edu" />
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary w-100" onclick="doLogin()" id="login-btn">
      <span id="btn-text">Sign in</span>
    </button>
  </div>

  <script src="js/api.js"></script>
  <script>
    if (localStorage.getItem("tnp_admin")) window.location.href = "dashboard.html";

    async function doLogin() {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const alertEl  = document.getElementById("alert-box");
      const btn      = document.getElementById("login-btn");
      alertEl.classList.add("d-none");
      if (!email || !password) { alertEl.textContent = "Please enter email and password."; alertEl.classList.remove("d-none"); return; }
      btn.disabled = true;
      document.getElementById("btn-text").textContent = "Signing in...";
      try {
        const data = await api.post("/admin/login", { email, password });
        localStorage.setItem("tnp_admin", JSON.stringify(data.admin));
        window.location.href = "dashboard.html";
      } catch (err) {
        alertEl.textContent = err.error || "Login failed. Check your credentials.";
        alertEl.classList.remove("d-none");
        btn.disabled = false;
        document.getElementById("btn-text").textContent = "Sign in";
      }
    }
    document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  </script>
</body>
</html>
