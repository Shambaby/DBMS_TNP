<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TNP Portal — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body { background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
    .login-card { background: #fff; border-radius: 16px; border: 1px solid #e2e8f0; padding: 2.5rem 2rem; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .brand-icon { width: 52px; height: 52px; background: #1a56db; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
    .brand-icon i { color: #fff; font-size: 26px; }
    .btn-primary { background: #1a56db; border-color: #1a56db; }
    .btn-primary:hover { background: #1e40af; border-color: #1e40af; }
    .form-control:focus { border-color: #1a56db; box-shadow: 0 0 0 3px rgba(26,86,219,0.12); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand-icon"><i class="bi bi-mortarboard-fill"></i></div>
    <h4 class="text-center fw-semibold mb-1">TNP Portal</h4>
    <p class="text-center text-muted small mb-4">Training & Placement Management System</p>

    <div id="alert-box" class="alert alert-danger d-none small py-2"></div>

    <div class="mb-3">
      <label class="form-label small fw-medium">Email address</label>
      <input type="email" id="email" class="form-control" placeholder="admin@tnp.edu" />
    </div>
    <div class="mb-4">
      <label class="form-label small fw-medium">Password</label>
      <input type="password" id="password" class="form-control" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary w-100 fw-medium" onclick="doLogin()">
      <span id="btn-text">Sign in</span>
    </button>

    <p class="text-center text-muted small mt-4 mb-0">
      TNP Cell &mdash; Admin Access Only
    </p>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem("tnp_admin")) window.location.href = "dashboard.html";

    async function doLogin() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.querySelector("button");
      const alert = document.getElementById("alert-box");
      alert.classList.add("d-none");

      if (!email || !password) {
        alert.textContent = "Please enter email and password.";
        alert.classList.remove("d-none");
        return;
      }

      btn.disabled = true;
      document.getElementById("btn-text").textContent = "Signing in...";

      try {
        const data = await api.post("/admin/login", { email, password });
        localStorage.setItem("tnp_admin", JSON.stringify(data.admin));
        window.location.href = "dashboard.html";
      } catch (err) {
        alert.textContent = err.error || "Login failed. Check your credentials.";
        alert.classList.remove("d-none");
        btn.disabled = false;
        document.getElementById("btn-text").textContent = "Sign in";
      }
    }

    document.addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
  </script>
</body>
</html>
