<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TNP Portal — Companies</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="page-header">
    <div class="container-fluid px-4 d-flex align-items-center justify-content-between">
      <div><h4>Companies</h4><span class="text-muted">Manage partner companies</span></div>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#companyModal" onclick="openAddModal()">
        <i class="bi bi-plus-lg me-1"></i> Add Company
      </button>
    </div>
  </div>

  <div class="container-fluid px-4 py-4">
    <div class="data-table-card">
      <div class="table-header">
        <h6 class="mb-0 fw-semibold" id="table-count">All Companies</h6>
        <input type="search" class="form-control form-control-sm w-auto" placeholder="Search..." id="search-input" oninput="filterTable(this.value)" />
      </div>
      <div class="table-responsive">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>#</th><th>Company Name</th><th>Company Type</th><th>Email</th><th>Contact</th><th>Website</th><th>Description</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="companies-body">
            <tr><td colspan="8" class="empty-state"><i class="bi bi-hourglass-split"></i>Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="companyModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content rounded-4">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-semibold" id="modal-title">Add Company</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body pt-2">
          <input type="hidden" id="company-id" />
          <input type="hidden" id="company-address" />
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label small fw-medium">Company Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="company-name" />
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-medium">Company Type</label>
              <input type="text" class="form-control" id="company-type" />
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-medium">Email</label>
              <input type="email" class="form-control" id="company-email" />
            </div>
            <div class="col-md-6">
              <label class="form-label small fw-medium">Contact No.</label>
              <input type="text" class="form-control" id="company-contact" />
            </div>
            <div class="col-12">
              <label class="form-label small fw-medium">Website Link</label>
              <input type="url" class="form-control" id="company-website" placeholder="https://example.com" />
            </div>
            <div class="col-12">
              <label class="form-label small fw-medium">Company Description</label>
              <textarea class="form-control" id="company-description" rows="3"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer border-0 pt-0">
          <button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary" onclick="saveCompany()">Save Company</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script>
    renderNav("companies");
    let allCompanies = [];

    async function loadCompanies() {
      try {
        allCompanies = await api.get("/companies");
        renderTable(allCompanies);
        document.getElementById("table-count").textContent = `All Companies (${allCompanies.length})`;
      } catch (err) {
        document.getElementById("companies-body").innerHTML = `<tr><td colspan="8" class="empty-state"><i class="bi bi-exclamation-circle"></i>Failed to load</td></tr>`;
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById("companies-body");
      tbody.innerHTML = data.length ? data.map((c, i) => `
        <tr>
          <td>${i + 1}</td>
          <td><strong>${c.company_name}</strong></td>
          <td>${c.industry_type || "—"}</td>
          <td>${c.email || "—"}</td>
          <td>${c.contact_no || "—"}</td>
          <td>${c.website ? `<a href="${c.website}" target="_blank" rel="noopener">Open</a>` : "—"}</td>
          <td style="max-width:260px;"><span class="text-truncate d-block" style="max-width:240px;" title="${c.description || ""}">${c.description || "—"}</span></td>
          <td>
            <button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal(${c.company_id})"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteCompany(${c.company_id}, '${c.company_name}')"><i class="bi bi-trash"></i></button>
          </td>
        </tr>`).join("") : `<tr><td colspan="8" class="empty-state"><i class="bi bi-building"></i>No companies found</td></tr>`;
    }

    function filterTable(q) {
      const query = q.toLowerCase();
      const filtered = allCompanies.filter(c =>
        c.company_name.toLowerCase().includes(query) ||
        (c.industry_type || "").toLowerCase().includes(query) ||
        (c.email || "").toLowerCase().includes(query) ||
        (c.contact_no || "").toLowerCase().includes(query) ||
        (c.website || "").toLowerCase().includes(query) ||
        (c.description || "").toLowerCase().includes(query)
      );
      renderTable(filtered);
    }

    function openAddModal() {
      document.getElementById("modal-title").textContent = "Add Company";
      document.getElementById("company-id").value = "";
      document.getElementById("company-name").value = "";
      document.getElementById("company-type").value = "";
      document.getElementById("company-email").value = "";
      document.getElementById("company-address").value = "";
      document.getElementById("company-contact").value = "";
      document.getElementById("company-website").value = "";
      document.getElementById("company-description").value = "";
    }

    async function openEditModal(id) {
      const c = allCompanies.find(x => x.company_id === id);
      document.getElementById("modal-title").textContent = "Edit Company";
      document.getElementById("company-id").value = c.company_id;
      document.getElementById("company-name").value = c.company_name;
      document.getElementById("company-type").value = c.industry_type || "";
      document.getElementById("company-email").value = c.email || "";
      document.getElementById("company-address").value = c.address || "";
      document.getElementById("company-contact").value = c.contact_no || "";
      document.getElementById("company-website").value = c.website || "";
      document.getElementById("company-description").value = c.description || "";
      new bootstrap.Modal(document.getElementById("companyModal")).show();
    }

    async function saveCompany() {
      const id = document.getElementById("company-id").value;
      const payload = {
        company_name: document.getElementById("company-name").value.trim(),
        industry_type: document.getElementById("company-type").value.trim(),
        email: document.getElementById("company-email").value.trim(),
        address: document.getElementById("company-address").value.trim(),
        contact_no: document.getElementById("company-contact").value.trim(),
        website: document.getElementById("company-website").value.trim(),
        description: document.getElementById("company-description").value.trim(),
      };
      if (!payload.company_name) { showToast("Company name is required", "error"); return; }
      try {
        if (id) {
          await api.put(`/companies/${id}`, payload);
          showToast("Company updated");
        } else {
          await api.post("/companies", payload);
          showToast("Company added");
        }
        bootstrap.Modal.getInstance(document.getElementById("companyModal")).hide();
        loadCompanies();
      } catch (err) {
        showToast(err.error || "Failed to save", "error");
      }
    }

    async function deleteCompany(id, name) {
      if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
      try {
        await api.delete(`/companies/${id}`);
        showToast("Company deleted");
        loadCompanies();
      } catch (err) {
        showToast(err.error || "Failed to delete", "error");
      }
    }

    loadCompanies();
  </script>
</body>
</html>
