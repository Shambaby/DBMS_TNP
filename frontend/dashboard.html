<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TNP Portal — Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="page-header">
    <div class="container-fluid px-4">
      <div class="d-flex align-items-center justify-content-between">
        <div>
          <h4>Dashboard</h4>
          <span class="text-muted">Overview of placements &amp; activities</span>
        </div>
        <span class="badge bg-success-subtle text-success px-3 py-2 rounded-pill" id="health-badge">
          <i class="bi bi-circle-fill me-1" style="font-size:8px;"></i> System Online
        </span>
      </div>
    </div>
  </div>

  <div class="container-fluid px-4 py-4">
    <!-- Stat cards -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-4 col-lg-2">
        <div class="stat-card">
          <div class="stat-icon bg-primary bg-opacity-10 text-primary mb-2"><i class="bi bi-people-fill"></i></div>
          <div class="stat-value" id="s-students">—</div>
          <div class="stat-label">Total Students</div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-2">
        <div class="stat-card">
          <div class="stat-icon bg-info bg-opacity-10 text-info mb-2"><i class="bi bi-building-fill"></i></div>
          <div class="stat-value" id="s-companies">—</div>
          <div class="stat-label">Companies</div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-2">
        <div class="stat-card">
          <div class="stat-icon bg-warning bg-opacity-10 text-warning mb-2"><i class="bi bi-briefcase-fill"></i></div>
          <div class="stat-value" id="s-jobs">—</div>
          <div class="stat-label">Job Openings</div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-2">
        <div class="stat-card">
          <div class="stat-icon bg-secondary bg-opacity-10 text-secondary mb-2"><i class="bi bi-file-earmark-text-fill"></i></div>
          <div class="stat-value" id="s-apps">—</div>
          <div class="stat-label">Applications</div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-2">
        <div class="stat-card">
          <div class="stat-icon bg-success bg-opacity-10 text-success mb-2"><i class="bi bi-trophy-fill"></i></div>
          <div class="stat-value" id="s-placed">—</div>
          <div class="stat-label">Placed</div>
        </div>
      </div>
      <div class="col-6 col-md-4 col-lg-2">
        <div class="stat-card">
          <div class="stat-icon bg-danger bg-opacity-10 text-danger mb-2"><i class="bi bi-currency-rupee"></i></div>
          <div class="stat-value" id="s-ctc">—</div>
          <div class="stat-label">Avg. CTC</div>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <!-- Recent Placements -->
      <div class="col-lg-7">
        <div class="data-table-card">
          <div class="table-header">
            <h6 class="mb-0 fw-semibold">Recent Placements</h6>
            <a href="placements.html" class="btn btn-sm btn-outline-primary">View all</a>
          </div>
          <div class="table-responsive">
            <table class="table table-hover">
              <thead>
                <tr>
                  <th>Student</th>
                  <th>Department</th>
                  <th>Company</th>
                  <th>CTC</th>
                  <th>Joining</th>
                </tr>
              </thead>
              <tbody id="recent-placements">
                <tr><td colspan="5" class="empty-state"><i class="bi bi-hourglass-split"></i>Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Dept Stats -->
      <div class="col-lg-5">
        <div class="data-table-card">
          <div class="table-header">
            <h6 class="mb-0 fw-semibold">Placement by Department</h6>
          </div>
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr><th>Department</th><th>Placed</th><th>% Share</th></tr>
              </thead>
              <tbody id="dept-stats">
                <tr><td colspan="3" class="empty-state"><i class="bi bi-hourglass-split"></i>Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script>
    renderNav("dashboard");

    async function loadDashboard() {
      try {
        const d = await api.get("/dashboard/stats");
        document.getElementById("s-students").textContent = d.total_students;
        document.getElementById("s-companies").textContent = d.total_companies;
        document.getElementById("s-jobs").textContent = d.total_jobs;
        document.getElementById("s-apps").textContent = d.total_applications;
        document.getElementById("s-placed").textContent = d.total_placements;
        document.getElementById("s-ctc").textContent = d.avg_ctc ? "₹" + Number(d.avg_ctc).toLocaleString("en-IN") : "—";

        const rp = document.getElementById("recent-placements");
        rp.innerHTML = d.recent_placements.length ? d.recent_placements.map(p => `
          <tr>
            <td>${p.email || "—"}</td>
            <td><span class="badge-dept">${p.dept || "—"}</span></td>
            <td>${p.company_name || "—"}</td>
            <td><span class="badge-ctc">${formatCTC(p.ctc)}</span></td>
            <td>${formatDate(p.join_date)}</td>
          </tr>`).join("") : `<tr><td colspan="5" class="empty-state"><i class="bi bi-inbox"></i>No placements yet</td></tr>`;

        const total = d.dept_stats.reduce((a, b) => a + Number(b.placed), 0) || 1;
        const ds = document.getElementById("dept-stats");
        ds.innerHTML = d.dept_stats.length ? d.dept_stats.map(r => `
          <tr>
            <td>${r.dept}</td>
            <td>${r.placed}</td>
            <td>
              <div class="d-flex align-items-center gap-2">
                <div class="progress flex-grow-1" style="height:6px;">
                  <div class="progress-bar bg-primary" style="width:${Math.round(r.placed/total*100)}%"></div>
                </div>
                <small>${Math.round(r.placed/total*100)}%</small>
              </div>
            </td>
          </tr>`).join("") : `<tr><td colspan="3" class="empty-state"><i class="bi bi-inbox"></i>No data</td></tr>`;
      } catch (err) {
        console.error("Dashboard error:", err);
      }
    }
    loadDashboard();
  </script>
</body>
</html>
